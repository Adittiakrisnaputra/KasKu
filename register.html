<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Register Page -->
    <div id="registerPage" class="register-page" style="display: none">
      <div class="login-card">
        <div class="login-logo register-logo">💳</div>
        <h1 class="login-title">Daftar Anggota</h1>
        <p class="login-subtitle">Daftar untuk menggunakan Kas Ku</p>

        <div class="form-group">
          <label>Nama Lengkap</label>
          <input type="text" id="regName" placeholder="Masukkan nama lengkap" />
        </div>

        <div class="form-group">
          <label>Username</label>
          <input type="text" id="regUsername" placeholder="Masukkan username" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="contoh@email.com" />
        </div>

        <div class="form-group">
          <label>Nomor Telepon</label>
          <input type="tel" id="regPhone" placeholder="08123456789" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="regPassword"
            placeholder="Minimal 6 karakter"
          />
        </div>

        <div class="form-group">
          <label>Konfirmasi Password</label>
          <input
            type="password"
            id="regConfirmPassword"
            placeholder="Ulangi password"
          />
        </div>

        <button class="btn-primary" onclick="register()">
          Daftar Sekarang
        </button>
        <button class="btn-secondary" onclick="showLogin()">
          ← Kembali ke Login
        </button>
      </div>
    </div>
  </body>
</html>
